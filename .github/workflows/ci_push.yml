# Pipeline CI para los Pull Request a dev, qa y prod

name: CI_Push

on:
    push:
        branches: [dev, qa, prod]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
            POSTGRES_USER: neondb_owner
            POSTGRES_PASSWORD: npg_fpDq2yzaYh0Q
            POSTGRES_DB: neondb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://neondb_owner:npg_fpDq2yzaYh0Q@ep-wispy-snow-aie26bkz-pooler.c-4.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
      SSL_MODE: disable

    steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Configurar Python
          uses: actions/setup-python@v5
          with:
            python-version: "3.12"

        - name: Cache de dependencias
          uses: actions/cache@v4
          with:
            path: ~/.cache/pip
            key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
            restore-keys: |
                ${{ runner.os }}-pip-

        - name: Instalar dependencias
          run: |
            python -m pip install --upgrade pip
            pip install -r requirements.txt
            pip install ruff pip-audit

        - name: Crear/actualizar BD (migración)
          run: python migrate_db.py

        - name: Seed (datos iniciales)
          run: python seed_db.py

        - name: Pruebas (smoke test)
          run: python -c "from src.app import app; from fastapi.testclient import TestClient; c = TestClient(app); r = c.get('/'); assert r.status_code == 200; b = r.json(); assert b.get('success') is True; assert 'data' in b; print('Smoke test OK')"